name: PR Checks

on:
  pull_request:
    branches:
      - dev
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bootstrap development environment
        run: bash ./scripts/bootstrap-dev.sh

      - name: Check repository hygiene
        run: bash ./scripts/check-text-files.sh

  repository-baseline:
    name: Repository Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/platform/go.mod

      - name: Bootstrap development environment
        run: bash ./scripts/bootstrap-dev.sh

      - name: Check repository baseline
        run: bash ./scripts/check-repo.sh --skip-text-files

  web-build:
    name: RadishMind Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/radishmind-web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: apps/radishmind-web

      - name: Test web lifecycle and coverage budgets
        run: npm run test:coverage
        working-directory: apps/radishmind-web

      - name: Build web app
        run: npm run build
        working-directory: apps/radishmind-web

  console-build:
    name: RadishMind Console Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/radishmind-console/package-lock.json

      - name: Install Console dependencies
        run: npm ci
        working-directory: apps/radishmind-console

      - name: Build Console app
        run: npm run build
        working-directory: apps/radishmind-console

  platform-go-tests:
    name: Platform Go Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/platform/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test platform core coverage budgets
        run: python3 scripts/checks/platform/check_platform_core_coverage.py

      - name: Test platform service with race detector
        run: go test -race ./...
        working-directory: services/platform

      - name: Vet platform service
        run: go vet ./...
        working-directory: services/platform

  platform-postgres-integration:
    name: Platform PostgreSQL Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: radishmind_saved_draft_test
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: radishmind_migrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U radishmind_migrator -d radishmind_saved_draft_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/platform/go.mod

      - name: Test platform PostgreSQL repositories
        env:
          RADISHMIND_RUN_POSTGRES_INTEGRATION: "1"
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: radishmind_migrator
          PGDATABASE: radishmind_saved_draft_test
          PGSSLMODE: disable
          RADISHMIND_POSTGRES_INTEGRATION_RUNTIME_USER: radishmind_runtime
        run: go test -count=1 -cover -tags=postgres_integration ./internal/httpapi
        working-directory: services/platform
